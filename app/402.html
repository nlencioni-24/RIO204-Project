<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Room 402</title>

  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

<header>
  <div class="back-btn" onclick="goHome()">⬅</div>
  <h1>Room 402 – 4th Floor</h1>
</header>

<div class="content">
  <div class="card">
    <div class="row"><span>Availability</span><span id="availability">🟢 Free</span></div>
    <div class="row"><span>Estimated occupancy</span><span id="occupancy">0 people</span></div>
    <div class="row"><span>Temperature</span><span id="temperature">21°C</span></div>
    <div class="row"><span>Humidity</span><span id="humidity">45%</span></div>
    <div class="row"><span>Light</span><span>Good</span></div>
    <div class="row"><span>AC / Heating</span><span>No</span></div>
  </div>

  <div class="buttons">
    <button class="contribute">I am in this room</button>
    <button class="favorite">⭐ Mark favorite / Go there</button>
  </div>
</div>

<script src="src/sensors.js"></script>
<script>
function goHome(){window.location.href='index.html'}

function updateRoomValues(){
  const sensor = sensorData["402"];
  if(!sensor) return;

  const availabilityElem = document.getElementById('availability');
  const occupancyElem = document.getElementById('occupancy');
  const tempElem = document.getElementById('temperature');
  const humElem = document.getElementById('humidity');

  // Disponibilité selon occupancy
  if(sensor.occupancy===0){
    availabilityElem.textContent="🟢 Free";
    availabilityElem.className="free";
  } else if(sensor.occupancy<=20){
    availabilityElem.textContent="🟠 Partial";
    availabilityElem.className="partial";
  } else {
    availabilityElem.textContent="🔴 Occupied";
    availabilityElem.className="occupied";
  }

  occupancyElem.textContent=sensor.occupancy+" people";
  tempElem.textContent=sensor.temperature+"°C";
  humElem.textContent=sensor.humidity+"%";
}

setInterval(updateRoomValues,5000);
updateRoomValues();
</script>

</body>
</html>
